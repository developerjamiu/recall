<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Recall - A full-stack Dart & Flutter notes app">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Recall">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Recall</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #F4F4F4;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-icon {
      width: 64px;
      height: 64px;
      animation: breathe 2s ease-in-out infinite;
    }

    .loading-text {
      margin-top: 16px;
      font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #101010;
      letter-spacing: -0.5px;
    }

    .loading-bar {
      margin-top: 24px;
      width: 120px;
      height: 3px;
      background: rgba(0, 163, 175, 0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar-fill {
      width: 40%;
      height: 100%;
      background: #00A3AF;
      border-radius: 2px;
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }

    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    @media (prefers-color-scheme: dark) {
      #loading-screen {
        background: #101010;
      }

      .loading-text {
        color: #F4F4F4;
      }

      .loading-bar {
        background: rgba(0, 163, 175, 0.2);
      }
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <svg class="loading-icon" width="64" height="64" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="6" width="40" height="48" rx="6" fill="#00A3AF"/>
      <path d="M38 6H44C47.3137 6 50 8.68629 50 12V6L38 6Z" fill="#00727A"/>
      <path d="M50 6V18L38 6H50Z" fill="#00727A" opacity="0.6"/>
      <rect x="18" y="22" width="24" height="3" rx="1.5" fill="white" opacity="0.9"/>
      <rect x="18" y="30" width="18" height="3" rx="1.5" fill="white" opacity="0.7"/>
      <rect x="18" y="38" width="21" height="3" rx="1.5" fill="white" opacity="0.5"/>
      <circle cx="44" cy="46" r="4" fill="#FFA368"/>
    </svg>
    <div class="loading-text">Recall</div>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    function hideLoadingScreen() {
      var el = document.getElementById('loading-screen');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function() {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        }, 400);
      }
    }

    // Hide once the app signals it's ready (auth resolved, first page rendered).
    // Falls back to flutter-first-frame if the app never dispatches 'app-ready'.
    window.addEventListener('app-ready', hideLoadingScreen);
    window.addEventListener('flutter-first-frame', function() {
      setTimeout(hideLoadingScreen, 3000);
    });
    setTimeout(hideLoadingScreen, 10000);
  </script>
</body>

</html>

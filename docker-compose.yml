services:
  postgres:
    image: postgres:16-alpine
    container_name: recall_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: recall
      POSTGRES_PASSWORD: recall
      POSTGRES_DB: recall_dev
    volumes:
      - recall_data:/var/lib/postgresql/data

volumes:
  recall_data:
